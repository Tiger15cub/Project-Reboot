name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Patch Code for Modern MSVC
      shell: powershell
      run: |
        # Force the project file to strictly use standard behavior to allow C++20 modules
        $projPath = "Project Reboot\Project Reboot.vcxproj"
        (Get-Content $projPath) -replace '<ConformanceMode>false</ConformanceMode>', '<ConformanceMode>true</ConformanceMode>' | Set-Content $projPath

        # Inject missing forward declarations right at the beginning of structs.h
        $structsPath = "Project Reboot\structs.h"
        $declaration = @"
        #pragma once
        struct UObject;
        extern "C" UObject* GetByIndex(int Index);
        "@
        (Get-Content $structsPath) -replace '#pragma once', $declaration | Set-Content $structsPath

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      env:
        CL: "/D_SILENCE_ALL_MS_EXT_DEPRECATION_WARNINGS /permissive"
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}} /p:DefineConstants="_SILENCE_ALL_MS_EXT_DEPRECATION_WARNINGS"


    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Release
        path: ${{ env.SOLUTION_FILE_PATH }}/x64/Release
        if-no-files-found: warn
        retention-days: 60
